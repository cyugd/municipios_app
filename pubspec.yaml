name: municipios_app
description: Aplicación informativa de los 43 municipios de Tamaulipas.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  google_sign_in: ^6.2.1
  google_generative_ai: ^0.4.0
  flutter_riverpod: ^2.5.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_tts: ^4.0.0
  url_launcher: ^6.1.0
  model_viewer_plus: ^1.8.0
  path_provider: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/images/
    - assets/models/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/app_logo.png"
  adaptive_icon_background: "#008080"
